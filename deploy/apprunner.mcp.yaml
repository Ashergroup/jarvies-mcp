version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -e .
      - pip install "mcp[cli]"
run:
  command: uvicorn agents.mcp.server:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: PORT
  env:
    - name: PORT
      value: "8080"
    - name: ENVIRONMENT
      value: "production"
    - name: MCP_ALLOW_UNAUTHENTICATED
      value: "false"
